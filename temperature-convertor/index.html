<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Temperature Converter</title>
  </head>
  <body>
    <form>
      <h1 class="title">Temperature Converter</h1>
      <input type="number" id="tempInput" placeholder="Enter temperature" />
      <div class="radioButtons">
          <input type="radio" id="toFahrenheit" class="radio" name="conversionType" checked/>
          <label for="toFahrenheit">Celsius ⮕ Fahrenheit</label>
          <input type="radio" id="toCelsius" class="radio" name="conversionType"  />
        <label for="toCelsius">Fahrenheit ⮕ Celsius</label>
      </div>
      <div id="output"></div>
      <button id="convertButton" type="button" onclick="convertTemperature()">
        Convert
      </button>
    </form>
    <script src="script.js"></script>
  </body>
</html>
